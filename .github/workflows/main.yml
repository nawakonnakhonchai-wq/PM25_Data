name: Hourly Air Quality Update

on:
  # รับสัญญาณจากภายนอก (ผ่าน cron-job.org)
  repository_dispatch:
    types: [run-air-quality-update]
  # รันทุกชั่วโมง (นาทีที่ 0)
  schedule:
    - cron: '0 * * * *'
  # รองรับการกดรันด้วยมือผ่านหน้า GitHub Actions
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper Script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # ตรวจสอบการเปลี่ยนแปลง
          if [[ -n $(git status --porcelain) ]]; then
            git add air_quality.geojson
            git commit -m "Auto-update GeoJSON: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
