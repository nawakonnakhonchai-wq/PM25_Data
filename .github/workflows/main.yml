name: Hourly Air Quality Update (GeoJSON)

on:
  schedule:
    # รันทุกชั่วโมง (นาทีที่ 0)
    - cron: '0 * * * *'
  # รองรับการกดรันด้วยมือผ่านหน้า GitHub Actions
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # ให้สิทธิ์การเขียนไฟล์กลับเข้า Repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper Script
        run: python main.py

      - name: Commit and push changes
        run: |
          # ตั้งค่าบัญชีผู้กระทำ (ใช้บอทของ GitHub)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # ตรวจสอบสถานะว่ามีการสร้างไฟล์ใหม่หรืออัปเดตไฟล์หรือไม่
          if [[ -n $(git status --porcelain) ]]; then
            git add air_quality.geojson
            git commit -m "Auto-update GeoJSON: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
